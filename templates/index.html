<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>AI School Magazine Generator</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:420px;
background:#1e293b;
padding:35px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:22px;
margin-bottom:5px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
color:#cbd5f5;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
text-align:left;
}

label{
font-size:13px;
opacity:0.9;
}

input[type="text"]{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:none;
outline:none;
font-size:14px;
}

.upload-box{
border:2px dashed #38bdf8;
padding:20px;
border-radius:8px;
margin-top:6px;
background:#0f172a;
}

input[type="file"]{
margin-top:8px;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0ea5e9;
}

.footer{
margin-top:20px;
font-size:12px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<img src="/static/logo.png" class="logo">

<h1>SANMATI HIGHER SECONDARY SCHOOL</h1>

<div class="subtitle">
AI Magazine Article Generator
</div>

<form action="/generate" method="POST" enctype="multipart/form-data">

<div class="input-group">

<label>Event Name / Hint</label>

<input type="text" name="hint" placeholder="Example: Holi Celebration / Sports Day" required>

</div>

<div class="input-group">

<label>Upload Event Photos</label>

<div class="upload-box">

<input type="file" name="photos" multiple required>

</div>

</div>

<button type="submit">
Generate Magazine Page
</button>

</form>

<div class="footer">
Powered by AI • School Magazine System
</div>

</div>

</body>
</html>
